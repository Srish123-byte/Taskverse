<section class="change-password-dialog">
  <button
    *ngIf="!isSubmitting"
    type="button"
    class="dialog-close-button"
    aria-label="Close change password dialog"
    (click)="cancel()">
    <mat-icon>close</mat-icon>
  </button>

  <ng-container *ngIf="!isSubmitting; else updatingState">
    <span class="change-password-kicker">Account Security</span>
    <h3>Change Password</h3>
    <p>Update your password below. You'll be signed out and need to log in again with your new password.</p>

    <div *ngIf="errorMessage" class="change-password-error">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate class="change-password-form">
      <label for="changePasswordCurrentPassword">Current Password</label>
      <div class="password-field-wrapper">
        <input
          id="changePasswordCurrentPassword"
          [type]="isPasswordVisible('currentPassword') ? 'text' : 'password'"
          formControlName="currentPassword"
          autocomplete="current-password" />
        <button
          type="button"
          class="password-toggle-button"
          [attr.aria-label]="isPasswordVisible('currentPassword') ? 'Hide current password' : 'Show current password'"
          (click)="togglePasswordVisibility('currentPassword')">
          <mat-icon>{{ isPasswordVisible('currentPassword') ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <label for="changePasswordNewPassword">New Password</label>
      <div class="password-field-wrapper">
        <input
          id="changePasswordNewPassword"
          [type]="isPasswordVisible('newPassword') ? 'text' : 'password'"
          formControlName="newPassword"
          autocomplete="new-password" />
        <button
          type="button"
          class="password-toggle-button"
          [attr.aria-label]="isPasswordVisible('newPassword') ? 'Hide new password' : 'Show new password'"
          (click)="togglePasswordVisibility('newPassword')">
          <mat-icon>{{ isPasswordVisible('newPassword') ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <label for="changePasswordConfirmPassword">Confirm New Password</label>
      <div class="password-field-wrapper">
        <input
          id="changePasswordConfirmPassword"
          [type]="isPasswordVisible('confirmPassword') ? 'text' : 'password'"
          formControlName="confirmPassword"
          autocomplete="new-password" />
        <button
          type="button"
          class="password-toggle-button"
          [attr.aria-label]="isPasswordVisible('confirmPassword') ? 'Hide confirm password' : 'Show confirm password'"
          (click)="togglePasswordVisibility('confirmPassword')">
          <mat-icon>{{ isPasswordVisible('confirmPassword') ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <div class="change-password-actions">
        <button type="button" class="change-password-button change-password-button-muted" (click)="cancel()">
          Cancel
        </button>
        <button type="submit" class="change-password-button change-password-button-primary">
          Change Password
        </button>
      </div>
    </form>
  </ng-container>

  <ng-template #updatingState>
    <div class="change-password-loader">
      <app-dashboard-loader
        tone="dark"
        title="Updating your password"
        copy="Signing you out so you can log back in with your new password.">
      </app-dashboard-loader>
    </div>
  </ng-template>
</section>
