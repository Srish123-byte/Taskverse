<div class="editor-shell">
  <button type="button" class="back-link" (click)="goToQuestionBank()">
    &#8592; Back to Question Bank
  </button>

  <section class="editor-hero">
    <span class="hero-kicker">{{ heroKicker }}</span>
    <h2 class="page-title">{{ pageTitle }}</h2>
    <p class="page-welcome">
      {{ pageDescription }}
    </p>
  </section>

  <div *ngIf="errorMessage" class="page-state page-state-error">{{ errorMessage }}</div>

  <div *ngIf="successMessage" class="success-popup-backdrop">
    <section class="success-popup" (click)="$event.stopPropagation()">
      <div class="success-popup-icon" aria-hidden="true"></div>
      <h3>Saved Successfully</h3>
      <p>{{ successMessage }}</p>
      <button type="button" class="success-popup-action" (click)="closeSuccessMessage()">Cancel</button>
    </section>
  </div>

  <form [formGroup]="form" class="editor-form" (ngSubmit)="saveToRepository()">
    <section class="editor-card">
      <div class="section-title">Classification</div>
      <div class="form-grid form-grid-3">
        <label class="field">
          <span>Stream *</span>
          <ng-container *ngIf="!isCustomStream; else customStreamField">
            <select [value]="streamSelection" (change)="onStreamSelectionChange($any($event.target).value)">
              <option value="">Select stream</option>
              <option *ngFor="let item of streamOptions" [value]="item">{{ item }}</option>
              <option [value]="addNewOptionValue">Add new stream</option>
            </select>
          </ng-container>
          <ng-template #customStreamField>
            <div class="custom-entry-shell">
              <input type="text" formControlName="stream" placeholder="Enter new stream" />
              <button type="button" class="custom-entry-reset" (click)="resetStreamSelection()">Use existing</button>
            </div>
          </ng-template>
        </label>

        <label class="field">
          <span>Subject *</span>
          <ng-container *ngIf="!isCustomSubject; else customSubjectField">
            <select [value]="subjectSelection" (change)="onSubjectSelectionChange($any($event.target).value)">
              <option value="">Select subject</option>
              <option *ngFor="let item of subjectOptions" [value]="item">{{ item }}</option>
              <option [value]="addNewOptionValue">Add new subject</option>
            </select>
          </ng-container>
          <ng-template #customSubjectField>
            <div class="custom-entry-shell">
              <input type="text" formControlName="subject" placeholder="Enter new subject" />
              <button type="button" class="custom-entry-reset" (click)="resetSubjectSelection()">Use existing</button>
            </div>
          </ng-template>
        </label>

        <label class="field">
          <span>Topic *</span>
          <ng-container *ngIf="!isCustomTopic; else customTopicField">
            <select [value]="topicSelection" (change)="onTopicSelectionChange($any($event.target).value)">
              <option value="">Select topic</option>
              <option *ngFor="let item of topicOptions" [value]="item">{{ item }}</option>
              <option [value]="addNewOptionValue">Add new topic</option>
            </select>
          </ng-container>
          <ng-template #customTopicField>
            <div class="custom-entry-shell">
              <input type="text" formControlName="topic" placeholder="Enter new topic" />
              <button type="button" class="custom-entry-reset" (click)="resetTopicSelection()">Use existing</button>
            </div>
          </ng-template>
        </label>

        <label class="field">
          <span>Difficulty Level *</span>
          <select formControlName="difficultyLevel">
            <option *ngFor="let option of difficultyOptions" [ngValue]="option.value">{{ option.label }}</option>
          </select>
        </label>

        <label class="field field-span-2">
          <span>Question Type *</span>
          <select formControlName="questionType">
            <option *ngFor="let option of questionTypeOptions" [ngValue]="option.value">{{ option.label }}</option>
          </select>
        </label>
      </div>
    </section>

    <section class="editor-card">
      <div class="section-title">Scoring</div>
      <div class="form-grid form-grid-2">
        <label class="field">
          <span>Marks *</span>
          <input type="number" min="0" step="0.01" formControlName="marks" />
        </label>

        <label class="field">
          <span>Negative Marks *</span>
          <input type="number" min="0" step="0.01" formControlName="negativeMarks" />
        </label>
      </div>
    </section>

    <section class="editor-card">
      <div class="section-title">Question</div>
      <label class="field">
        <span>Question Text *</span>
        <textarea rows="6" formControlName="questionText"></textarea>
      </label>
    </section>

    <section *ngIf="isMcq" class="editor-card">
      <div class="section-title">Options &amp; Correct Answer</div>
      <div class="options-list">
        <label *ngFor="let control of optionsArray.controls; let index = index" class="option-row">
          <input type="radio" name="mcqAnswer" [value]="getOptionLabel(index)" [checked]="answerControl.value === getOptionLabel(index)" (change)="answerControl.setValue(getOptionLabel(index))" />
          <span class="option-badge">{{ getOptionLabel(index) }}</span>
          <input type="text" [formControl]="control" [placeholder]="'Enter option ' + getOptionLabel(index)" />
        </label>
      </div>
    </section>

    <section *ngIf="!isMcq" class="editor-card">
      <div class="section-title">Correct Answer</div>
      <label class="field">
        <span>Answer *</span>
        <input type="text" formControlName="answer" />
      </label>
    </section>

    <section class="editor-card">
      <div class="section-title">Explanation</div>
      <label class="field">
        <span>Explanation</span>
        <textarea rows="5" formControlName="explanation"></textarea>
      </label>
    </section>

    <section class="editor-card">
      <div class="section-title">Discovery &amp; Tags</div>
      <label class="field">
        <span>Topic Tag *</span>
        <input type="text" formControlName="topicTag" placeholder="Arrays, loops, recursion" />
        <small>Enter multiple topic tags separated by commas.</small>
      </label>
    </section>

    <div class="action-row">
      <button type="button" class="secondary-action" (click)="cancel()">Discard Changes</button>
      <button type="submit" class="primary-action" [disabled]="isSaving || isLoading">{{ submitButtonLabel }}</button>
    </div>
  </form>
</div>
