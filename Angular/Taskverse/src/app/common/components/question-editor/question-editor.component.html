<div class="editor-shell">
  <button type="button" class="back-link" (click)="goToQuestionBank()">
    &#8592; Back to Question Bank
  </button>

  <section class="editor-hero">
    <span class="hero-kicker">{{ heroKicker }}</span>
    <h2 class="page-title">Add New Question</h2>
    <p class="page-welcome">
      Create a question and save it directly into the shared repository.
    </p>
  </section>

  <div *ngIf="errorMessage" class="page-state page-state-error">{{ errorMessage }}</div>

  <form [formGroup]="form" class="editor-form" (ngSubmit)="saveToRepository()">
    <section class="editor-card">
      <div class="section-title">Classification</div>
      <div class="form-grid form-grid-3">
        <label class="field">
          <span>Stream *</span>
          <input type="text" formControlName="stream" list="stream-options" />
        </label>

        <label class="field">
          <span>Subject *</span>
          <input type="text" formControlName="subject" list="subject-options" />
        </label>

        <label class="field">
          <span>Topic *</span>
          <input type="text" formControlName="topic" list="topic-options" />
        </label>

        <label class="field">
          <span>Difficulty Level *</span>
          <select formControlName="difficultyLevel">
            <option *ngFor="let option of difficultyOptions" [ngValue]="option.value">{{ option.label }}</option>
          </select>
        </label>

        <label class="field field-span-2">
          <span>Question Type *</span>
          <select formControlName="questionType">
            <option *ngFor="let option of questionTypeOptions" [ngValue]="option.value">{{ option.label }}</option>
          </select>
        </label>
      </div>
    </section>

    <section class="editor-card">
      <div class="section-title">Scoring</div>
      <div class="form-grid form-grid-2">
        <label class="field">
          <span>Marks *</span>
          <input type="number" min="0" step="0.01" formControlName="marks" />
        </label>

        <label class="field">
          <span>Negative Marks *</span>
          <input type="number" min="0" step="0.01" formControlName="negativeMarks" />
        </label>
      </div>
    </section>

    <section class="editor-card">
      <div class="section-title">Question</div>
      <label class="field">
        <span>Question Text *</span>
        <textarea rows="6" formControlName="questionText"></textarea>
      </label>
    </section>

    <section *ngIf="isMcq" class="editor-card">
      <div class="section-title">Options &amp; Correct Answer</div>
      <div class="options-list">
        <label *ngFor="let control of optionsArray.controls; let index = index" class="option-row">
          <input type="radio" name="mcqAnswer" [value]="getOptionLabel(index)" [checked]="answerControl.value === getOptionLabel(index)" (change)="answerControl.setValue(getOptionLabel(index))" />
          <span class="option-badge">{{ getOptionLabel(index) }}</span>
          <input type="text" [formControl]="control" [placeholder]="'Enter option ' + getOptionLabel(index)" />
        </label>
      </div>
    </section>

    <section *ngIf="!isMcq" class="editor-card">
      <div class="section-title">Correct Answer</div>
      <label class="field">
        <span>Answer *</span>
        <input type="text" formControlName="answer" />
      </label>
    </section>

    <section class="editor-card">
      <div class="section-title">Explanation</div>
      <label class="field">
        <span>Explanation</span>
        <textarea rows="5" formControlName="explanation"></textarea>
      </label>
    </section>

    <section class="editor-card">
      <div class="section-title">Discovery &amp; Tags</div>
      <label class="field">
        <span>Topic Tag *</span>
        <input type="text" formControlName="topicTag" />
      </label>
    </section>

    <div class="action-row">
      <button type="button" class="secondary-action" (click)="cancel()">Cancel</button>
      <button type="submit" class="primary-action" [disabled]="isSaving">{{ isSaving ? 'Saving...' : 'Save to Repository' }}</button>
    </div>
  </form>

  <datalist id="stream-options">
    <option *ngFor="let item of streamOptions" [value]="item"></option>
  </datalist>

  <datalist id="subject-options">
    <option *ngFor="let item of subjectOptions" [value]="item"></option>
  </datalist>

  <datalist id="topic-options">
    <option *ngFor="let item of topicOptions" [value]="item"></option>
  </datalist>
</div>
