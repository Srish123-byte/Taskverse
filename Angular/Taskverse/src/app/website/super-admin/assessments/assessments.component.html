<div class="page-container">
  <div class="page-eyebrow">Super Admin</div>
  <h2 class="page-title">Assessments</h2>
  <p class="page-welcome">A platform-wide view for governing assessment creation, completion, and quality controls.</p>

  <div class="assessment-grid">
    <article *ngFor="let item of spotlight" class="assessment-card">
      <div class="assessment-icon">
        <mat-icon>assignment</mat-icon>
      </div>
      <h3>{{ item.title }}</h3>
      <p>{{ item.body }}</p>
    </article>
  </div>
</div>
