<div class="login-page">
  <div class="login-card mat-elevation-z4">
    <h1 class="login-title">Taskverse</h1>
    <p class="login-subtitle">Sign in to your account</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="email?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="email?.hasError('email')">Enter a valid email address</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
        <mat-error *ngIf="password?.hasError('required')">Password is required</mat-error>
        <mat-error *ngIf="password?.hasError('minlength')">Minimum 8 characters</mat-error>
      </mat-form-field>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button
        mat-raised-button
        color="primary"
        type="submit"
        class="full-width submit-btn"
        [disabled]="isLoading">
        <mat-spinner *ngIf="isLoading" diameter="20" class="btn-spinner"></mat-spinner>
        <span *ngIf="!isLoading">Sign In</span>
      </button>
    </form>
  </div>
</div>
