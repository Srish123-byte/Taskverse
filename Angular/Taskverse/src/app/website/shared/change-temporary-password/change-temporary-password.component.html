<div class="password-change-page">
  <section class="password-change-card mat-elevation-z4">
    <p class="page-eyebrow">First Sign-In</p>
    <h1>Change your temporary password</h1>
    <p class="page-copy">
      Your account needs a permanent password before you can access the rest of Taskverse.
    </p>

    <div *ngIf="errorMessage" class="page-state page-state-error">{{ errorMessage }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label for="currentPassword">Temporary Password</label>
      <div class="password-field-wrapper">
        <input
          id="currentPassword"
          [type]="isPasswordVisible('currentPassword') ? 'text' : 'password'"
          formControlName="currentPassword"
          autocomplete="current-password" />
        <button
          type="button"
          class="password-toggle-button"
          [attr.aria-label]="isPasswordVisible('currentPassword') ? 'Hide temporary password' : 'Show temporary password'"
          (click)="togglePasswordVisibility('currentPassword')">
          <mat-icon>{{ isPasswordVisible('currentPassword') ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <label for="newPassword">New Password</label>
      <div class="password-field-wrapper">
        <input
          id="newPassword"
          [type]="isPasswordVisible('newPassword') ? 'text' : 'password'"
          formControlName="newPassword"
          autocomplete="new-password" />
        <button
          type="button"
          class="password-toggle-button"
          [attr.aria-label]="isPasswordVisible('newPassword') ? 'Hide new password' : 'Show new password'"
          (click)="togglePasswordVisibility('newPassword')">
          <mat-icon>{{ isPasswordVisible('newPassword') ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <label for="confirmPassword">Confirm New Password</label>
      <div class="password-field-wrapper">
        <input
          id="confirmPassword"
          [type]="isPasswordVisible('confirmPassword') ? 'text' : 'password'"
          formControlName="confirmPassword"
          autocomplete="new-password" />
        <button
          type="button"
          class="password-toggle-button"
          [attr.aria-label]="isPasswordVisible('confirmPassword') ? 'Hide confirm password' : 'Show confirm password'"
          (click)="togglePasswordVisibility('confirmPassword')">
          <mat-icon>{{ isPasswordVisible('confirmPassword') ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </div>

      <button type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Updating Password...' : 'Change Password' }}
      </button>
    </form>
  </section>
</div>
